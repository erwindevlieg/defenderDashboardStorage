name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/**']
  pull_request:
    branches: [main]
    paths: ['infra/**']

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-defender-dashboard
  AZURE_LOCATION: westeurope
  BICEP_FILE: infra/main.bicep
  BICEP_PARAMS: infra/main.bicepparam

jobs:
  validate:
    name: Validate & What-If
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep Build (validate)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az bicep build --file ${{ env.BICEP_FILE }} --stdout > /dev/null

      - name: What-If Preview
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az deployment group what-if \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --template-file ${{ env.BICEP_FILE }} \
              --parameters ${{ env.BICEP_PARAMS }}

  deploy:
    name: Deploy
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az deployment group create \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --template-file ${{ env.BICEP_FILE }} \
              --parameters ${{ env.BICEP_PARAMS }} \
              --name "deploy-$(date +%Y%m%d-%H%M%S)"
