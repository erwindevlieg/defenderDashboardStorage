name: Dependabot Auto-Merge

on:
  workflow_run:
    workflows: ["CI Checks"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    steps:
      - name: Find PR for this commit
        id: pr
        run: |
          PR_NUMBER=$(gh api "repos/$REPO/pulls?state=open" \
            --jq ".[] | select(.head.sha == \"$HEAD_SHA\") | .number")
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for $HEAD_SHA"
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Found Dependabot PR #$PR_NUMBER"
        env:
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and merge
        if: steps.pr.outputs.number
        run: |
          gh pr review --approve "$PR_NUMBER" --repo "$REPO"
          gh pr merge --squash "$PR_NUMBER" --repo "$REPO"
        env:
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
