name: CI Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ============================================================
  # ARM template sync — ensures azuredeploy.json matches Bicep.
  # Locally you may forget to recompile after Bicep changes.
  # ============================================================
  arm-template-check:
    name: Deploy Template Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compile Bicep to ARM
        uses: azure/CLI@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        with:
          inlineScript: |
            az bicep build --file infra/main.bicep --outfile azuredeploy.check.json

      - name: Compare with committed azuredeploy.json
        run: |
          # Normalize line endings (Windows builds use CRLF)
          sed -i 's/\r$//' azuredeploy.json
          sed -i 's/\\r\\n/\\n/g' azuredeploy.json
          sed -i 's/\\r\\n/\\n/g' azuredeploy.check.json
          # Strip bicep-generated metadata (templateHash + version) before diffing.
          # These fields differ between Bicep binary builds even on the same source,
          # so they are unsuitable for sync verification. The functional template
          # content is what matters.
          sed -E -i 's/"(templateHash|version)": "[^"]*"/"\1": "<stripped>"/g' azuredeploy.json azuredeploy.check.json
          if ! diff -q azuredeploy.json azuredeploy.check.json > /dev/null 2>&1; then
            echo "::error::azuredeploy.json is out of date. Run 'az bicep build --file infra/main.bicep --outfile azuredeploy.json' and commit."
            diff azuredeploy.json azuredeploy.check.json | head -50
            exit 1
          fi

  # ============================================================
  # Bicep lint — validates all Bicep files compile without errors
  # ============================================================
  bicep-lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Bicep Build (lint)
        uses: azure/CLI@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        with:
          inlineScript: |
            az bicep build --file infra/main.bicep --stdout > /dev/null

  # ============================================================
  # Python lint + format — ruff catches bugs, style issues,
  # and import problems that may not surface locally
  # ============================================================
  # ============================================================
  # Lint suite — pre-commit is the single source of truth.
  # Runs ruff, ruff-format, mypy, yamllint, markdownlint, interrogate,
  # and the basic pre-commit-hooks suite over every file in the repo.
  # Local devs run the exact same hooks via `pre-commit run --all-files`.
  # ============================================================
  pre-commit:
    name: Pre-commit (lint + format + types + docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  # ============================================================
  # Python tests — run full test suite (no pre-commit equivalent).
  # ============================================================
  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: function-app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: function-app/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --cov=polling --cov-report=term-missing --cov-fail-under=70

  # ============================================================
  # Dependency audit — check for known vulnerabilities
  # ============================================================
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: function-app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: function-app/requirements*.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        # PYSEC-2025-183 (pyjwt): transitive via msal; no fix version released yet.
        # Re-evaluate once an upstream patch lands.
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2025-183

  # ============================================================
  # Security: scan for secrets accidentally committed
  # ============================================================
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          extra_args: --only-verified
