name: CI Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ============================================================
  # ARM template sync — ensures azuredeploy.json matches Bicep.
  # Locally you may forget to recompile after Bicep changes.
  # ============================================================
  arm-template-check:
    name: Deploy Template Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compile Bicep to ARM
        uses: azure/CLI@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        with:
          inlineScript: |
            az bicep build --file infra/main.bicep --outfile azuredeploy.check.json

      - name: Compare with committed azuredeploy.json
        run: |
          # Normalize line endings before comparing (Windows builds use CRLF)
          sed -i 's/\r$//' azuredeploy.json
          sed -i 's/\\r\\n/\\n/g' azuredeploy.json
          sed -i 's/\\r\\n/\\n/g' azuredeploy.check.json
          if ! diff -q azuredeploy.json azuredeploy.check.json > /dev/null 2>&1; then
            echo "::error::azuredeploy.json is out of date. Run 'az bicep build --file infra/main.bicep --outfile azuredeploy.json' and commit."
            diff azuredeploy.json azuredeploy.check.json | head -50
            exit 1
          fi

  # ============================================================
  # Bicep lint — validates all Bicep files compile without errors
  # ============================================================
  bicep-lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Bicep Build (lint)
        uses: azure/CLI@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        with:
          inlineScript: |
            az bicep build --file infra/main.bicep --stdout > /dev/null

  # ============================================================
  # Python lint + format — ruff catches bugs, style issues,
  # and import problems that may not surface locally
  # ============================================================
  python-lint:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: function-app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy polling

  # ============================================================
  # Python tests — run full test suite
  # ============================================================
  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: function-app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v

  # ============================================================
  # Dependency audit — check for known vulnerabilities
  # ============================================================
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: function-app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

  # ============================================================
  # Security: scan for secrets accidentally committed
  # ============================================================
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          extra_args: --only-verified
