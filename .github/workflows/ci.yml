name: CI Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ============================================================
  # Connector generation check — ensures generated files match
  # connector YAML manifests. Catches forgotten regeneration.
  # ============================================================
  generate-check:
    name: Connector Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run generator
        run: python scripts/generate.py

      - name: Verify generated files are up to date
        run: |
          if ! git diff --quiet; then
            echo "::error::Generated files are out of date. Run 'python scripts/generate.py' and commit the results."
            git diff --stat
            git diff
            exit 1
          fi

  # ============================================================
  # ARM template sync — ensures azuredeploy.json matches Bicep.
  # Locally you may forget to recompile after Bicep changes.
  # ============================================================
  arm-template-check:
    name: Deploy Template Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile Bicep to ARM
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az bicep build --file infra/main.bicep --outfile azuredeploy.check.json

      - name: Compare with committed azuredeploy.json
        run: |
          if ! diff -q azuredeploy.json azuredeploy.check.json > /dev/null 2>&1; then
            echo "::error::azuredeploy.json is out of date. Run 'az bicep build --file infra/main.bicep --outfile azuredeploy.json' and commit."
            diff azuredeploy.json azuredeploy.check.json | head -50
            exit 1
          fi

  # ============================================================
  # Bicep lint — validates all Bicep files compile without errors
  # ============================================================
  bicep-lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bicep Build (lint)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az bicep build --file infra/main.bicep --stdout > /dev/null
            az bicep build --file infra/generated/tables.bicep --stdout > /dev/null
            az bicep build --file infra/generated/dcr.bicep --stdout > /dev/null

  # ============================================================
  # Python lint + format — ruff catches bugs, style issues,
  # and import problems that may not surface locally
  # ============================================================
  python-lint:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: function-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # ============================================================
  # Python tests — run full test suite with coverage
  # ============================================================
  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: function-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v

  # ============================================================
  # Security: scan for secrets accidentally committed
  # ============================================================
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ============================================================
  # YAML validation — ensures connector manifests are valid
  # ============================================================
  yaml-validate:
    name: Connector YAML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate connector manifests
        run: |
          python -c "
          import yaml, sys, pathlib

          required = {'key','name','table','schedule','dcr','url','scope','transform','plan','totalRetention','columns'}
          valid_plans = {'Analytics','Basic'}
          valid_schedules = {'daily','weekly'}
          valid_transforms = {'single','list','graphList','exportList'}
          valid_types = {'string','int','real','datetime','boolean','dynamic'}
          errors = []

          for f in sorted(pathlib.Path('connectors').glob('*.yaml')):
              with open(f) as fh:
                  data = yaml.safe_load(fh)
              if data is None:
                  continue

              missing = required - set(data.keys())
              if missing:
                  errors.append(f'{f.name}: missing fields: {missing}')
                  continue

              if not data['table'].endswith('_CL'):
                  errors.append(f'{f.name}: table must end with _CL')
              if data['plan'] not in valid_plans:
                  errors.append(f'{f.name}: plan must be Analytics or Basic')
              if data['plan'] == 'Analytics' and 'retention' not in data:
                  errors.append(f'{f.name}: Analytics plan requires retention field')
              if data['schedule'] not in valid_schedules:
                  errors.append(f'{f.name}: schedule must be daily or weekly')
              if data['transform'] not in valid_transforms:
                  errors.append(f'{f.name}: invalid transform: {data[\"transform\"]}')

              keys_seen = set()
              for col in data['columns']:
                  if col['type'] not in valid_types:
                      errors.append(f'{f.name}: invalid column type: {col[\"type\"]}')
                  if col['name'] == 'TimeGenerated':
                      errors.append(f'{f.name}: do not include TimeGenerated (added automatically)')
                  if col['name'] in keys_seen:
                      errors.append(f'{f.name}: duplicate column: {col[\"name\"]}')
                  keys_seen.add(col['name'])

          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)
          else:
              print(f'All connector manifests valid')
          "
