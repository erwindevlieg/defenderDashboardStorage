key: alertAggregates
name: Defender Alert Aggregates
table: DefenderAlertAggregates_CL
schedule: daily
dcr: daily
plan: Analytics
retention: 365
totalRetention: 1826

# NOTE: This endpoint uses Advanced Hunting to aggregate alerts.
# The Function App computes aggregates from the alerts API response.
url: https://api.securitycenter.microsoft.com/api/alerts
scope: https://api.securitycenter.microsoft.com/.default
transform: list

columns:
  - name: TotalAlerts
    type: int
  - name: HighSeverity
    type: int
  - name: MediumSeverity
    type: int
  - name: LowSeverity
    type: int
  - name: MTTR_Hours
    type: real
  - name: MTTD_Hours
    type: real
