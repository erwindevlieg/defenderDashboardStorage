key: intuneDetectedApps
name: Intune Detected Applications
table: IntuneDetectedApps_CL
schedule: weekly
dcr: intune
plan: Basic
totalRetention: 365

url: https://graph.microsoft.com/v1.0/deviceManagement/detectedApps
scope: https://graph.microsoft.com/.default
transform: graphList

columns:
  - name: ApplicationName
    type: string
  - name: ApplicationVersion
    type: string
  - name: DeviceCount
    type: int
  - name: Platform
    type: string
